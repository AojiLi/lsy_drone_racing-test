# Level3 v55 reference-tracker gate-aperture mini training config.
#
# Purpose:
# - train the low-level PPO tracker on a controlled single-gate task after
#   free-space tracking is stable.
# - keep Level3-like drone dynamics and attitude action interface.
# - avoid modifying the final competition target: hard eval still uses
#   config/level3.toml.
#
# The first version uses one controlled gate and one far-away dummy obstacle.
# Add obstacle pressure only after valid aperture crossing and post-gate
# recovery are stable.

[controller]
file = "level3_reference_tracker_controller.py"

[deploy]
check_race_track = true
check_drone_start_pos = true
real_track_objects = true

[[deploy.drones]]
id = 52
channel = 80
drone_model = "cf21B_500"

[train.reference_tracker]
env_mode = "gate_aperture"
description = "Single-gate aperture curriculum before unchanged level3.toml planner smoke."

[sim]
physics = "first_principles"
drone_model = "cf21B_500"
freq = 500
attitude_freq = 500
render = true
camera = -1
[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.4, 0.0, 0.7]

[env]
id = "DroneRacing-v0"
seed = -1
freq = 50
sensor_range = 1.2
control_mode = "attitude"

[env.track]
randomize = false

[[env.track.gates]]
pos = [0.85, 0.0, 0.75]
rpy = [0.0, 0.0, 0.0]

[[env.track.obstacles]]
pos = [8.0, -8.0, 1.55]

[[env.track.drones]]
pos = [0.0, 0.0, 0.01]
rpy = [0.0, 0.0, 0.0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[env.track.safety_limits]
pos_limit_low = [-2.5, -1.5, -1e-3]
pos_limit_high = [2.5, 1.5, 2.0]

[env.randomizations.drone_pos]
fn = "uniform"
[env.randomizations.drone_pos.kwargs]
minval = [-0.04, -0.04, 0.0]
maxval = [0.04, 0.04, 0.02]

[env.randomizations.drone_rpy]
fn = "uniform"
[env.randomizations.drone_rpy.kwargs]
minval = [-0.04, -0.04, -0.08]
maxval = [0.04, 0.04, 0.08]
